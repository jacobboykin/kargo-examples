apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kargo-demo-20
  namespace: argocd
spec:
  generators:
  - list:
      elements:
      - stage: test
  template:
    metadata:
      name: kargo-demo-20-{{stage}}
      annotations:
        kargo.akuity.io/authorized-stage: kargo-demo-20:{{stage}}
    spec:
      project: default
      source:
        repoURL: https://github.com/<github-username>/kargo-demo-gitops.git
        targetRevision: placeholder
        path: stages/{{stage}}
        kustomize:
          images:
          - public.ecr.aws/nginx/nginx=public.ecr.aws/nginx/nginx:1.24.0
      destination:
        server: https://kubernetes.default.svc
        namespace: kargo-demo-20-{{stage}}
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
        - CreateNamespace=true
  ignoreApplicationDifferences:
  - jqPathExpressions:
    - .spec.source.targetRevision
